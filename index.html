// ── Draw utility ─────────────────────────────────────────────────
function drawSprite(spr, dx, dy, scale) {
  const px = spr.px, pal = spr.pal;
  for (let r = 0; r < px.length; r++) {
    for (let c = 0; c < px[r].length; c++) {
      const ci = px[r][c];
      if (ci === 0) continue;
      X.fillStyle = pal[ci];
      X.fillRect(dx + c * scale, dy + r * scale, scale, scale);
    }
  }
}

// ── Tile helpers ─────────────────────────────────────────────────
function tile(tx, ty) {
  if (ty < 0 || ty >= GH || tx < 0 || tx >= GW) return 'W';
  return MAPFIX[ty][tx];
}

function isWall(tx, ty) { return tile(tx, ty) === 'W'; }
function isChest(tx, ty) { return tx === chestPos.x && ty === chestPos.y; }

function isBlockedByMonster(tx, ty) {
  return monsters.some(m => !m.defeated && m.x === tx && m.y === ty);
}

// ── Drawing: Dungeon ──────────────────────────────────────────────
function drawDungeon() {
  // Background
  X.fillStyle = '#050310';
  X.fillRect(0, 0, 800, 600);

  // Tiles
  for (let r = 0; r < GH; r++) {
    for (let c = 0; c < GW; c++) {
      const ch = MAPFIX[r][c];
      const px = c * T, py = r * T;
      if (ch === 'W') {
        // Wall — 3D block effect
        X.fillStyle = '#2a1050';
        X.fillRect(px, py, T, T);
        X.fillStyle = '#4a2080';
        X.fillRect(px, py, T, 6);        // top highlight
        X.fillStyle = '#1a0830';
        X.fillRect(px, py + T - 6, T, 6); // bottom shadow
        X.fillStyle = '#3a1868';
        X.fillRect(px + 2, py + 2, T - 4, T - 4);
      } else {
        // Floor — subtle checkerboard
        X.fillStyle = (r + c) % 2 === 0 ? '#0d0820' : '#100a25';
        X.fillRect(px, py, T, T);
        // Floor border (very subtle)
        X.strokeStyle = '#1a1035';
        X.lineWidth = 1;
        X.strokeRect(px + 0.5, py + 0.5, T - 1, T - 1);
      }
    }
  }

  // Health pickups
  healthPickups.forEach(hp => {
    if (!hp.active) return;
    const px = hp.x * T + 8, py = hp.y * T + 8;
    // Heart shape (pixel art)
    X.fillStyle = '#ff2244';
    X.fillRect(px+4, py,   8, 4);
    X.fillRect(px+16,py,   8, 4);
    X.fillRect(px,   py+4, 24, 8);
    X.fillRect(px+4, py+12, 16, 8);
    X.fillRect(px+8, py+20, 8,  4);
  });

  // Chest
  {
    const cx = chestPos.x * T + 4, cy = chestPos.y * T + 4;
    X.fillStyle = '#8B4513';
    X.fillRect(cx, cy, T - 8, T - 8);
    X.fillStyle = '#ffd700';
    X.fillRect(cx + 2, cy + 2, T - 12, (T - 8) / 2 - 2);
    X.fillStyle = '#ffec6e';
    X.fillRect(cx + (T-12)/2 - 3, cy + (T-8)/2 - 4, 10, 8);
    // Sparkle
    const t = Date.now() / 400;
    X.fillStyle = `rgba(255,220,50,${0.5 + 0.5 * Math.sin(t)})`;
    X.fillRect(cx + 10, cy - 6, 4, 4);
    X.fillRect(cx + T - 20, cy - 4, 3, 3);
  }

  // Monsters (small dungeon view)
  monsters.forEach((m, i) => {
    if (m.defeated) return;
    const dx = m.x * T + 4, dy = m.y * T + 4;
    drawSprite(MSPRITES[i], dx, dy, 4);
  });

  // Player
  {
    const dx = player.x * T + 4, dy = player.y * T + 4;
    drawSprite(SPR.player, dx, dy, 4);
  }

  // HUD — top bar
  X.fillStyle = 'rgba(0,0,0,0.7)';
  X.fillRect(0, 0, 800, 30);
  X.fillStyle = '#e8e0ff';
  X.font = '14px "Courier New"';
  X.fillText('HP:', 10, 20);
  drawBar(40, 8, 120, 14, player.hp, player.maxHp, '#ff2244', '#550011');
  X.fillStyle = '#ffd700';
  X.fillText(`Score: ${score}`, 200, 20);
  X.fillStyle = '#88aaff';
  X.fillText('Arrows=Move  Space=Battle  Esc=Cancel', 350, 20);

  // Screen flash feedback
  if (flashTimer > 0) {
    X.fillStyle = flashColor;
    X.fillRect(0, 0, 800, 600);
    flashTimer--;
  }
}

// ── Helpers ───────────────────────────────────────────────────────
function drawBar(x, y, w, h, val, max, col, bg) {
  X.fillStyle = bg;
  X.fillRect(x, y, w, h);
  X.fillStyle = col;
  X.fillRect(x, y, Math.round(w * (val / max)), h);
  X.strokeStyle = '#ffffff44';
  X.lineWidth = 1;
  X.strokeRect(x, y, w, h);
}

function wrapText(text, maxWidth) {
  const words = text.split(' ');
  const lines = [];
  let line = '';
  X.font = '16px "Courier New"';
  words.forEach(w => {
    const test = line ? line + ' ' + w : w;
    if (X.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = w;
    } else {
      line = test;
    }
  });
  if (line) lines.push(line);
  return lines;
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Remaining questions for current monster battle (shuffled pool)
let battlePool = [];
let currentQ   = null;

function pickNextBattleQuestion() {
  if (!battlePool.length) {
    battlePool = shuffle(Q_SETS[activeMonster.qset]);
  }
  currentQ = battlePool.pop();
  battleQ  = currentQ;
  battleIdx = 0;
}

let chestPool = [];
function pickNextChestQuestion() {
  if (!chestPool.length) chestPool = shuffle(allQuestions());
  currentQ = chestPool.pop();
  battleQ  = currentQ;
  battleIdx = 0;
}

// ── Game logic ────────────────────────────────────────────────────
function startGame() {
  stopBGM();
  initGame();
  gs = S.DUNGEON;
  startBGM();
}

function adjacentMonster() {
  const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
  for (const [dx, dy] of dirs) {
    const nx = player.x + dx, ny = player.y + dy;
    const m = monsters.find(m => !m.defeated && m.x === nx && m.y === ny);
    if (m) return m;
  }
  return null;
}

function tryMove(dx, dy) {
  const nx = player.x + dx, ny = player.y + dy;
  if (isWall(nx, ny)) return;
  if (isBlockedByMonster(nx, ny)) {
    activeMonster = monsters.find(m => !m.defeated && m.x === nx && m.y === ny);
    gs = S.PROMPT;
    return;
  }
  player.x = nx;
  player.y = ny;
  sfxMove();

  // Chest
  if (isChest(nx, ny)) {
    startChestChallenge();
    return;
  }

  // Health pickups
  healthPickups.forEach(hp => {
    if (hp.active && hp.x === nx && hp.y === ny) {
      hp.active = false;
      const gained = Math.min(3, player.maxHp - player.hp);
      player.hp += gained;
      flashColor = 'rgba(50,255,100,0.25)';
      flashTimer = 8;
    }
  });
}

// ── Battle ────────────────────────────────────────────────────────
function startBattle() {
  battlePool = shuffle(Q_SETS[activeMonster.qset]);
  pickNextBattleQuestion();
  battleFeedback = '';
  battleFeedbackTimer = 0;
  gs = S.BATTLE;
}

function submitBattleAnswer(idx) {
  if (battleFeedbackTimer > 0) return;
  const correct = idx === currentQ.ans;
  if (correct) {
    score += 10;
    activeMonster.hp--;
    battleFeedback = '✓ Correct! Monster takes damage!';
    flashColor = 'rgba(50,255,100,0.2)';
    sfxCorrect();
  } else {
    player.hp--;
    battleFeedback = `✗ Wrong! The answer was: ${currentQ.opts[currentQ.ans]}`;
    flashColor = 'rgba(255,50,50,0.2)';
    sfxWrong();
  }
  flashTimer = 6;
  battleFeedbackTimer = 90; // ~1.5 sec at 60fps

  if (activeMonster.hp <= 0) {
    setTimeout(onMonsterDefeated, 1500);
  } else if (player.hp <= 0) {
    setTimeout(onPlayerDied, 1500);
  } else {
    setTimeout(() => {
      battleFeedback = '';
      battleFeedbackTimer = 0;
      pickNextBattleQuestion();
    }, 1500);
  }
}

function onMonsterDefeated() {
  score += 50;
  sfxVictory();
  defeatedList.push(activeMonster.id);
  activeMonster.defeated = true;

  // Chest teleports to a new random chamber
  teleportChest(chestChamberIdx);

  activeMonster = null;
  battleQ = null;
  battleFeedback = '';
  battleFeedbackTimer = 0;
  gs = S.DUNGEON;
}

function onPlayerDied() {
  // Respawn player, bring back up to 2 defeated monsters
  player.hp = player.maxHp;
  player.x  = 2;
  player.y  = 2;

  const toRevive = Math.min(2, defeatedList.length);
  for (let i = 0; i < toRevive; i++) {
    const id = defeatedList.pop();
    const m = monsters.find(m => m.id === id);
    if (m) {
      m.defeated = false;
      m.hp = m.maxHp;
    }
  }

  activeMonster = null;
  battleQ = null;
  battleFeedback = '';
  battleFeedbackTimer = 0;
  gs = S.DUNGEON;
}

// ── Chest challenge ───────────────────────────────────────────────
function startChestChallenge() {
  chestProgress = 0;
  chestPool = shuffle(allQuestions());
  pickNextChestQuestion();
  chestFeedback = '';
  chestFeedbackTimer = 0;
  gs = S.CHEST;
}

function submitChestAnswer(idx) {
  if (chestFeedbackTimer > 0) return;
  const correct = idx === currentQ.ans;
  if (correct) {
    score += 20;
    chestProgress++;
    chestFeedback = '✓ Correct!';
    sfxCorrect();
    if (chestProgress >= 5) {
      sfxChestWin();
      stopBGM();
      setTimeout(() => { gs = S.WIN; }, 2000);
      return;
    }
    setTimeout(() => {
      chestFeedback = '';
      chestFeedbackTimer = 0;
      pickNextChestQuestion();
    }, 900);
  } else {
    chestFeedback = `✗ Wrong! Answer: ${currentQ.opts[currentQ.ans]} — Dungeon resets!`;
    sfxWrong();
    chestFeedbackTimer = 120;
    setTimeout(fullReset, 2500);
    return;
  }
  chestFeedbackTimer = 60;
}

function fullReset() {
  stopBGM();
  const savedScore = Math.max(0, score - 100);
  initGame();
  score = savedScore;
  gs = S.DUNGEON;
  startBGM();
}

// ── Audio Engine ─────────────────────────────────────────────────
let AC = null;          // AudioContext (created on first gesture)
let bgmActive = false;
let bgmTimer  = null;
let bgmNextTime = 0;
let musicOn = true;
let sfxOn   = true;

function toggleMusic() {
  musicOn = !musicOn;
  const btn = document.getElementById('btnMusic');
  btn.textContent = '♪ MUSIC: ' + (musicOn ? 'ON' : 'OFF');
  btn.className = musicOn ? '' : 'off';
  if (musicOn) { if (gs !== S.TITLE) startBGM(); }
  else stopBGM();
}
function toggleSfx() {
  sfxOn = !sfxOn;
  const btn = document.getElementById('btnSfx');
  btn.textContent = '♦ SFX: ' + (sfxOn ? 'ON' : 'OFF');
  btn.className = sfxOn ? '' : 'off';
}

function getAC() {
  if (!AC) {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    // Master compressor prevents clipping when SFX + BGM overlap
    const comp = AC.createDynamicsCompressor();
    comp.threshold.value = -18;
    comp.ratio.value = 4;
    comp.connect(AC.destination);
    AC._out = comp;
  }
  if (AC.state === 'suspended') AC.resume();
  return AC;
}

function schedNote(freq, type, vol, t, dur) {
  if (freq <= 0) return;
  const ac = getAC();
  const osc  = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.001, t);
  gain.gain.linearRampToValueAtTime(vol, t + 0.012);
  gain.gain.setValueAtTime(vol, t + dur * 0.65);
  gain.gain.linearRampToValueAtTime(0.001, t + dur);
  osc.connect(gain);
  gain.connect(ac._out);
  osc.start(t);
  osc.stop(t + dur + 0.02);
}

// ── SFX ──────────────────────────────────────────────────────────
function sfxMove() {
  if (!sfxOn) return;
  const ac = getAC(), t = ac.currentTime;
  schedNote(330, 'square', 0.055, t, 0.04);
}

function sfxCorrect() {
  if (!sfxOn) return;
  const ac = getAC(), t = ac.currentTime;
  [[523,0],[659,0.10],[784,0.20],[1047,0.32]].forEach(([f,d]) =>
    schedNote(f, 'square', 0.17, t+d, 0.16));
}

function sfxWrong() {
  if (!sfxOn) return;
  const ac = getAC(), t = ac.currentTime;
  schedNote(180, 'sawtooth', 0.22, t,      0.09);
  schedNote(120, 'sawtooth', 0.22, t+0.11, 0.12);
}

function sfxVictory() {
  if (!sfxOn) return;
  const ac = getAC(), t = ac.currentTime;
  [[392,0,0.14],[523,0.11,0.17],[659,0.22,0.19],[784,0.34,0.21],[1047,0.50,0.24]]
    .forEach(([f,d,v]) => schedNote(f, 'square', v, t+d, 0.20));
}

function sfxChestWin() {
  if (!sfxOn) return;
  const ac = getAC(), t = ac.currentTime;
  // Ascending run
  [523,587,659,784,880,988,1047].forEach((f,i) =>
    schedNote(f, 'square', 0.22, t + i*0.11, 0.18));
  // Final chord
  [523,659,784,1047].forEach(f =>
    schedNote(f, 'square', 0.15, t + 0.88, 0.90));
}

// ── Background Music ──────────────────────────────────────────────
// 8-bar dungeon theme in A natural minor, 112 BPM
const _Q = 60 / 112; // quarter-note duration (≈ 0.536 s)

// [freq_hz, duration_in_Q_beats]  — 0 = rest
const BGM_MELODY = [
  [440,2],[330,1],[392,1],       // bar 1 — A4.. E4 G4
  [349,1],[261,1],[330,1],[0,1], // bar 2 — F4 C4 E4 rest
  [294,2],[220,1],[196,1],       // bar 3 — D4.. A3 G3
  [220,3],[0,1],                 // bar 4 — A3... rest
  [330,2],[294,1],[261,1],       // bar 5 — E4.. D4 C4
  [247,1],[220,1],[196,1],[0,1], // bar 6 — B3 A3 G3 rest
  [261,2],[294,1],[330,1],       // bar 7 — C4.. D4 E4
  [220,3],[0,1],                 // bar 8 — A3... rest
];

const BGM_BASS = [
  [110,4],[110,4],   // bars 1-2 — A2
  [87, 4],[110,4],   // bars 3-4 — F2, A2
  [98, 4],[98, 4],   // bars 5-6 — G2
  [110,4],[110,4],   // bars 7-8 — A2
];

function _scheduleBGMChunk(startT) {
  let t = startT;
  BGM_MELODY.forEach(([f, beats]) => {
    const dur = beats * _Q;
    schedNote(f,       'square',   0.07, t, dur * 0.80); // melody
    schedNote(f * 0.5, 'triangle', 0.05, t, dur * 0.85); // melody octave below
    t += dur;
  });
  t = startT;
  BGM_BASS.forEach(([f, beats]) => {
    const dur = beats * _Q;
    schedNote(f, 'triangle', 0.09, t, dur * 0.88);
    t += dur;
  });
  const total = BGM_MELODY.reduce((s,[,b]) => s + b*_Q, 0);
  return total; // loop length in seconds
}

function _bgmSchedule() {
  if (!bgmActive) return;
  const ac = getAC();
  if (bgmNextTime - ac.currentTime < 1.2) {
    const dur = _scheduleBGMChunk(bgmNextTime);
    bgmNextTime += dur;
  }
  bgmTimer = setTimeout(_bgmSchedule, 250);
}

function startBGM() {
  if (!musicOn || bgmActive) return;
  bgmActive = true;
  const ac = getAC();
  bgmNextTime = ac.currentTime + 0.15;
  _bgmSchedule();
}

function stopBGM() {
  bgmActive = false;
  if (bgmTimer) { clearTimeout(bgmTimer); bgmTimer = null; }
}

// ── Input ─────────────────────────────────────────────────────────
let moveRepeat = 0;
let heldKey = '';

const keyHandlers = {
  [S.TITLE]: {
    'Space': () => startGame(),
    'Enter': () => startGame(),
  },
  [S.DUNGEON]: {},
  [S.PROMPT]: {
    'Space': () => startBattle(),
    'Escape': () => { activeMonster = null; gs = S.DUNGEON; },
    'KeyX': () => { activeMonster = null; gs = S.DUNGEON; },
  },
  [S.BATTLE]: {
    'Digit1': () => submitBattleAnswer(0),
    'Digit2': () => submitBattleAnswer(1),
    'Digit3': () => submitBattleAnswer(2),
    'Digit4': () => submitBattleAnswer(3),
    'Enter': () => submitBattleAnswer(battleIdx),
    'ArrowUp':   () => { battleIdx = (battleIdx + 3) % 4; },
    'ArrowDown': () => { battleIdx = (battleIdx + 1) % 4; },
  },
  [S.CHEST]: {
    'Digit1': () => submitChestAnswer(0),
    'Digit2': () => submitChestAnswer(1),
    'Digit3': () => submitChestAnswer(2),
    'Digit4': () => submitChestAnswer(3),
    'Enter': () => submitChestAnswer(battleIdx),
    'ArrowUp':   () => { battleIdx = (battleIdx + 3) % 4; },
    'ArrowDown': () => { battleIdx = (battleIdx + 1) % 4; },
  },
  [S.WIN]: {
    'Space': () => startGame(),
    'Enter': () => startGame(),
  },
  [S.OVER]: {
    'Space': () => startGame(),
    'Enter': () => startGame(),
  },
};

const MOVE_DIRS = {
  'ArrowUp':    [ 0, -1],
  'ArrowDown':  [ 0,  1],
  'ArrowLeft':  [-1,  0],
  'ArrowRight': [ 1,  0],
  'KeyW':       [ 0, -1],
  'KeyS':       [ 0,  1],
  'KeyA':       [-1,  0],
  'KeyD':       [ 1,  0],
};

const keysDown = new Set();

document.addEventListener('keydown', e => {
  // Prevent page scrolling
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.key)) {
    e.preventDefault();
  }

  const code = e.code;
  if (!keysDown.has(code)) {
    keysDown.add(code);
    const handler = keyHandlers[gs] && keyHandlers[gs][code];
    if (handler) handler();
    // First-press movement
    if (gs === S.DUNGEON && MOVE_DIRS[code]) {
      const [dx, dy] = MOVE_DIRS[code];
      tryMove(dx, dy);
      heldKey = code;
      moveRepeat = 0;
    }
  }
});

document.addEventListener('keyup', e => {
  keysDown.delete(e.code);
  if (e.code === heldKey) heldKey = '';
});

// ── Main loop ─────────────────────────────────────────────────────
let lastTime = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = ts - lastTime;
  lastTime = ts;

  // Held key repeat for dungeon movement
  if (gs === S.DUNGEON && heldKey && MOVE_DIRS[heldKey] && keysDown.has(heldKey)) {
    moveRepeat += dt;
    if (moveRepeat > 160) {
      moveRepeat -= 100;
      const [dx, dy] = MOVE_DIRS[heldKey];
      tryMove(dx, dy);
    }
  }

  // Decrement battle feedback timer
  if (battleFeedbackTimer > 0) battleFeedbackTimer--;
  if (chestFeedbackTimer > 0) chestFeedbackTimer--;

  // Render
  switch (gs) {
    case S.TITLE:   drawTitle();  break;
    case S.DUNGEON: drawDungeon(); break;
    case S.PROMPT:  drawPrompt(); break;
    case S.BATTLE:  drawBattle(); break;
    case S.CHEST:   drawChest();  break;
    case S.WIN:     drawWin();    break;
    case S.OVER:    drawOver();   break;
  }
}

// ── Boot ──────────────────────────────────────────────────────────
initGame();
requestAnimationFrame(loop);
</script>
